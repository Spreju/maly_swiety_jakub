<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FootballDB</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div id="loader" class="loader hidden">Ładowanie...</div>

        <header class="header">
            <div class="container header-inner">
                <a href="#" class="logo" data-view="home">⚽ Football<span>DB</span></a>

                <nav class="nav" id="nav">
                    <a href="#" class="nav-link active" data-view="home">Strona główna</a>
                    <a href="#" class="nav-link" data-view="players">Zawodnicy</a>
                    <a href="#" class="nav-link" data-view="favorites">Ulubieni (<span id="fav-count">0</span>)</a>
                </nav>

                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </header>

        <main class="container">
            <!-- Widok: strona główna -->
            <section class="view active" id="view-home">
                <div class="hero">
                    <h1>Baza piłkarzy ⚽</h1>
                    <p>Wyszukaj zawodnika i sprawdź jego dane</p>

                    <div class="search-box filters">
                        <input type="text" id="hero-search" placeholder="Wpisz nazwisko...">

                        <select id="hero-league">
                            <option value="106">Ekstraklasa</option>
                            <option value="39">Premier League</option>
                            <option value="140">La Liga</option>
                            <option value="78">Bundesliga</option>
                            <option value="135">Serie A</option>
                            <option value="61">Ligue 1</option>
                        </select>

                        <button id="hero-search-btn">Szukaj</button>
                    </div>
                </div>

                <h2>Popularni zawodnicy</h2>
                <div class="grid" id="popular-grid"></div>
            </section>

            <!-- Widok: lista zawodników -->
            <section class="view" id="view-players">
                <h1>Zawodnicy</h1>

                <div class="filters">
                    <input type="text" id="search" placeholder="Szukaj...">

                    <select id="filter-position">
                        <option value="">Wszystkie pozycje</option>
                        <option value="Goalkeeper">Bramkarz</option>
                        <option value="Defender">Obrońca</option>
                        <option value="Midfielder">Pomocnik</option>
                        <option value="Attacker">Napastnik</option>
                    </select>

                    <select id="sort">
                        <option value="name">Nazwa A-Z</option>
                        <option value="name2">Nazwa Z-A</option>
                        <option value="goals">Gole malejąco</option>
                        <option value="goals2">Gole rosnąco</option>
                        <option value="matches">Mecze malejąco</option>
                        <option value="matches2">Mecze rosnąco</option>
                        <option value="age">Wiek malejąco</option>
                        <option value="age2">Wiek rosnąco</option>
                    </select>
                </div>

                <p id="results-info"></p>
                <div class="players-list" id="players-list"></div>
            </section>

            <!-- Widok: szczegóły zawodnika -->
            <section class="view" id="view-detail">
                <button class="back-btn" data-view="players">← Wróć</button>
                <div class="detail-card" id="detail-card"></div>
            </section>

            <!-- Widok: ulubieni -->
            <section class="view" id="view-favorites">
                <h1>⭐ Ulubieni</h1>
                <div class="grid" id="favorites-grid"></div>
                <p id="fav-empty" class="empty-msg">Brak ulubionych. Dodaj kogoś!</p>
            </section>
        </main>

        <footer class="footer">
            <p>© 2026 FootballDB - Projekt zaliczeniowy</p>
        </footer>

        <script src="api.js"></script>
        <script src="dynamic.js"></script>
    </body>
</html>
